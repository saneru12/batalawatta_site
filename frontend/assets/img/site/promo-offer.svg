  <text x="56" y="176" fill="#f5fff9" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800">Indoor &amp; Seasonal</text>
  <text x="56" y="244" fill="#f5fff9" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800">Plants Collection</text>
  <text x="58" y="304" fill="#d9efe4" font-family="Arial, Helvetica, sans-serif" font-size="28">Fresh arrivals for home gardens, balconies, and living spaces.</text>
