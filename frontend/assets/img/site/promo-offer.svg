<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Batalawatta Plant Nursery special offer</title>
  <desc id="desc">Promotional banner with a green gradient background, plant leaves, and an offer for indoor and seasonal plants.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2f22" />
      <stop offset="55%" stop-color="#124632" />
      <stop offset="100%" stop-color="#0a1d15" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ee59d" />
      <stop offset="100%" stop-color="#8ef0c6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="800" height="500" rx="34" fill="url(#bg)"/>
  <circle cx="688" cy="92" r="130" fill="#2ee59d" opacity="0.14"/>
  <circle cx="115" cy="470" r="170" fill="#8ef0c6" opacity="0.10"/>
  <g opacity="0.28">
    <path d="M668 136c36 10 66 44 76 85-39 5-81-8-110-38 3-17 13-34 34-47z" fill="#8ef0c6"/>
    <path d="M598 358c50-26 119-23 167 8-35 45-108 63-161 39-12-16-15-31-6-47z" fill="#2ee59d"/>
    <path d="M108 126c58-6 115 24 148 71-54 28-127 17-175-30 2-15 12-29 27-41z" fill="#8ef0c6"/>
